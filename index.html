<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smurfer | Contact</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>

<body>


<div class="background"></div>


<main class="container">


<section class="hero">

<div class="avatar">
    S
</div>

<h1>
    Smurfer
</h1>

<p>
    Developer • Builder • Creator
</p>

<div class="links">

<a href="https://github.com/smurfer420">
GitHub
</a>

</div>

</section>



<section class="card">

<h2>
    Contact Me
</h2>

<p class="subtitle">
Have an idea or want to collaborate?
</p>


<form id="contact">


<input
name="name"
placeholder="Your name"
required
>


<textarea
name="message"
placeholder="Write your message..."
required
></textarea>



<input
name="website"
style="display:none"
autocomplete="off"
>


<button id="send">

<span id="text">
Send Message
</span>

<div class="loader"></div>

</button>


<p id="status"></p>


</form>

</section>


</main>


<script src="script.js"></script>

</body>
</html>
