<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h1>Contact Me</h1>
    <p>Send me a message and I'll get back to you.</p>

    <form id="contact">

        <input 
            name="name" 
            placeholder="Your name"
            required
        >

        <textarea
            name="message"
            placeholder="Your message"
            required
        ></textarea>

        <!-- Anti spam -->
        <input
            name="website"
            style="display:none"
            tabindex="-1"
            autocomplete="off"
        >

        <button id="send">
            <span id="text">Send</span>
            <div class="loader"></div>
        </button>

        <div id="status"></div>

    </form>
</div>


<script src="script.js"></script>

</body>
</html>
