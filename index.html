<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smurfer — About Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background"></div>
    <div class="background bg-2"></div>

    <div class="container">
        <div class="hero">
            <div class="avatar">S</div>
            <h1>Smurfer</h1>
            <p class="subtitle">Builder. Tinkerer. Internet dweller.</p>
            <div class="links">
                <a href="https://github.com/smurfer420" target="_blank">GitHub</a>
                <a href="#" target="_blank">Twitter</a>
                <a href="#" target="_blank">Discord</a>
            </div>
        </div>

        <div class="card">
            <h2>Contact Me</h2>
            <p class="subtitle">Send me a message and I'll get back to you.</p>

            <form id="contact">
                <input 
                    name="name" 
                    placeholder="Your name"
                    required
                    autocomplete="name"
                >

                <textarea
                    name="message"
                    placeholder="Your message"
                    required
                ></textarea>

                <!-- Anti spam -->
                <input
                    name="website"
                    class="honeypot"
                    tabindex="-1"
                    autocomplete="off"
                >

                <button id="send" type="submit">
                    <span id="text">Send</span>
                    <div class="loader"></div>
                </button>

                <div id="status"></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
